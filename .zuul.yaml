---
- project:
    templates:
      - publish-stx-docs
      - stx-api-ref-jobs
      - stx-release-notes-jobs
      - stx-bandit-jobs
    check:
      jobs:
        - openstack-tox-linters
        - stx-distcloud-tox-pep8
        - stx-distcloud-tox-py39
        - stx-distcloud-tox-pylint
        - stx-distcloud-tox-black
        - stx-distcloud-tox-cover
        - stx-distcloud-tox-openapi-check
    gate:
      jobs:
        - openstack-tox-linters
        - stx-distcloud-tox-pep8
        - stx-distcloud-tox-py39
        - stx-distcloud-tox-pylint
        - stx-distcloud-tox-black
        - stx-distcloud-tox-cover
        - stx-distcloud-tox-openapi-check
    post:
      jobs:
        - stx-distcloud-upload-git-mirror

- job:
    name: stx-distcloud-tox-py39
    parent: tox-py39
    description: Run py39 for distcloud
    nodeset: debian-bullseye
    pre-run:
      - tools/gate/playbooks/install-postgresql.yaml
      - tools/gate/playbooks/install-stx-custom-deps.yaml
    required-projects:
      - starlingx/fault
      - starlingx/nfv
      - starlingx/update
      - starlingx/config
      - starlingx/root
      - starlingx/utilities
    vars:
      python_version: 3.9
      tox_envlist: py39
      tox_extra_args: -c distributedcloud/tox.ini

- job:
    name: stx-distcloud-tox-pylint
    parent: tox
    description: Run pylint for distcloud
    nodeset: debian-bullseye
    required-projects:
      - starlingx/fault
      - starlingx/nfv
      - starlingx/update
      - starlingx/config
      - starlingx/utilities
    vars:
      python_version: 3.9
      tox_envlist: pylint
      tox_extra_args: -c distributedcloud/tox.ini

- job:
    name: stx-distcloud-tox-pep8
    parent: tox
    description: Run pep8 for distcloud
    nodeset: debian-bullseye
    required-projects:
      - starlingx/fault
      - starlingx/nfv
      - starlingx/update
      - starlingx/config
      - starlingx/utilities
    vars:
      python_version: 3.9
      tox_envlist: pep8
      tox_extra_args: -c distributedcloud/tox.ini

- job:
    name: stx-distcloud-tox-black
    parent: tox
    description: Run black for distcloud
    nodeset: debian-bullseye
    vars:
      python_version: 3.9
      tox_envlist: black
      tox_extra_args: -c distributedcloud/tox.ini

- job:
    name: stx-distcloud-tox-openapi-check
    parent: tox
    description: Check that the committed OpenAPI spec is up to date
    nodeset: debian-bullseye
    vars:
      python_version: 3.9
      tox_envlist: openapi-check

- job:
    name: stx-distcloud-tox-cover
    parent: tox
    description: Run coverage test for distcloud
    nodeset: debian-bullseye
    required-projects:
      - starlingx/fault
      - starlingx/nfv
      - starlingx/update
      - starlingx/config
      - starlingx/root
      - starlingx/utilities
    vars:
      python_version: 3.9
      tox_envlist: cover
      tox_extra_args: -c distributedcloud/tox.ini
    post-run: tools/gate/playbooks/fetch-coverage.yaml
    voting: false

- job:
    name: stx-distcloud-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/distcloud to
      github.com/starlingx/distcloud
    vars:
      git_mirror_repository: starlingx/distcloud
    secrets:
      - name: git_mirror_credentials
        secret: stx-distcloud-github-secret3
        pass-to-parent: true

