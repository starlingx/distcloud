          content:
            application/json:
              schema:
                type: object
                properties:
                  subcloud_peer_groups:
                    $ref: '#/components/schemas/subcloud_peer_groups'
              example:
                subcloud_peer_groups:
                - id: 1
                  peer_group_name: group1
                  group_priority: 0
                  group_state: enabled
                  max_subcloud_rehoming: 10
                  system_leader_id: fba24562-e071-4c09-8616-a96bc19702f3
