info:
  description: REST API for managing distributed cloud subclouds, peer groups,
    system
    peers, and orchestrated updates across multiple sites.
  contact:
    name: StarlingX
    url: https://www.starlingx.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: StarlingX Distributed Cloud Manager API
  version: 1.0.0
servers:
- url: https://{host}:{port}
  variables:
    host:
      default: localhost
    port:
      default: '8119'
security:
- XAuthToken: []
- OIDCToken: []
paths:
  /:
    get:
      summary: Get API version information
      description: Retrieve available API versions for the Distributed Cloud
        Manager
      operationId: getApiVersions
      tags:
      - root
      responses:
        '200':
          description: API versions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      type: object
              example:
                versions:
                - status: CURRENT
                  links:
                  - rel: self
                    href: http://localhost:8119/v1.0/
                  id: v1.0
                  updated: 2017-10-2
  /v1.0/subclouds:
    get:
      summary: Get subclouds
      description: Retrieve list of all subclouds or details of a specific
        subcloud
      operationId: getSubclouds
      tags:
      - subclouds
      parameters:
      - name: subcloud_ref
        in: query
        description: ID or name of subcloud
        required: false
        schema:
          type: string
      - name: detail
        in: query
        description: Include additional details
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Subclouds retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  subclouds:
                    $ref: '#/components/schemas/subclouds'
        '404':
          description: Subcloud not found
        '500':
          description: Internal server error
    post:
      summary: Create, deploy, migrate, or enroll a subcloud
      description: |
        Create and deploy a new subcloud with
        bootstrap, install, and deploy configuration.
        Also supports subcloud migration, enrollment,
        and secondary subcloud creation.

        Example request for subcloud enrollment
        (cloud_init_config is optional, only when
        enroll is true):
        ```
        enroll: true
        bootstrap_values: @subcloud10_ipv6-bootstrap-values.yaml
        install_values: @subcloud10-install-values.yaml
        deploy_config: @subcloud10-deploy-standard.yaml
        cloud_init_config: @cloud-init-config.tar
        sysadmin_password: cGFzc3dvcmQK
        bmc_password: cGFzc3dvcmQK
        bootstrap-address: 10.10.10.12
        ```
      operationId: createSubcloud
      tags:
      - subclouds
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/subcloud_name'
                description:
                  $ref: '#/components/schemas/subcloud_description'
                location:
                  $ref: '#/components/schemas/subcloud_location'
                group_id:
                  $ref: '#/components/schemas/group_id'
                bootstrap_values:
                  $ref: '#/components/schemas/bootstrap_values'
                install_values:
                  $ref: '#/components/schemas/install_values'
                deploy_config:
                  $ref: '#/components/schemas/deploy_config'
                cloud_init_config:
                  $ref: '#/components/schemas/cloud_init_config'
                bootstrap-address:
                  $ref: '#/components/schemas/bootstrap_address'
                bmc_password:
                  $ref: '#/components/schemas/bmc_password'
                sysadmin_password:
                  $ref: '#/components/schemas/sysadmin_password'
                release:
                  $ref: '#/components/schemas/release'
                migrate:
                  type: string
                  enum:
                  - 'true'
                  - 'false'
                  description: Set to 'true' to create a subcloud for migration
                    purposes.
                    Requires matching bootstrap subcloud name
                secondary:
                  type: string
                  description: Set to create a secondary subcloud. Secondary
                    subclouds
                    are created synchronously and do not require sysadmin
                    password
                    validation
                enroll:
                  type: string
                  enum:
                  - 'true'
                  - 'false'
                  description: Set to 'true' to enroll the subcloud after
                    creation.
                    cloud_init_config is optional only when enroll is true,
                    rejected
                    with 400 when enroll is false
                skip_enroll_init:
                  type: string
                  enum:
                  - 'true'
                  - 'false'
                  description: Set to 'true' to skip the initial enrollment
                    step.
                    Only valid when enroll is 'true'
            example:
              enroll: 'true'
              bootstrap_values: subcloud10_ipv6-bootstrap-values.yaml
              install_values: subcloud10-install-values.yaml
              deploy_config: subcloud10-deploy-standard.yaml
              cloud_init_config: cloud-init-config.tar
              sysadmin_password: cGFzc3dvcmQK
              bmc_password: cGFzc3dvcmQK
              bootstrap-address: 10.10.10.12
      responses:
        '200':
          description: Subcloud created successfully
          content:
            application/json:
              schema:
                type: object
              example:
                id: 9
                name: subcloud1-stx-latest
                description: subcloud1
                location: Kanata
                software-version: '26.03'
                management-state: unmanaged
                availability-status: offline
                deploy-status: not-deployed
                backup-status: null
                backup-datetime: null
                error-description: No errors present
                region-name: e6f93b0ca0764ca49c0779497bf20f82
                management-subnet: 192.168.101.0/24
                management-start-ip: 192.168.101.2
                management-end-ip: 192.168.101.50
                management-gateway-ip: 192.168.101.1
                openstack-installed: false
                prestage-status: null
                prestage-versions: null
                systemcontroller-gateway-ip: 192.168.204.101
                data_install: {}
                data_upgrade: null
                created-at: '2026-02-25 18:28:43.715335'
                updated-at: null
                group_id: 1
                peer_group_id: null
                rehome_data: null
        '400':
          description: Bad request
        '422':
          description: Unprocessable entity
        '500':
          description: Internal server error
    patch:
      summary: Update a subcloud
      description: |
        Update subcloud configuration, management
        state, or perform operations like redeploy,
        prestage, update_status, or management network
        reconfiguration. The verb parameter specifies
        the operation to perform.

        When verb is not specified, the PATCH method
        handles:
        - configuration updates (description, location,
          group_id, bootstrap values)
        - management state changes
        - subcloud rename
        - management network reconfiguration
        - peer group updates

        Example prestage request (verb=prestage):

            PATCH /v1.0/subclouds/{subcloud_ref}/prestage
            Content-Type: application/json
            {
              "sysadmin_password": "<base64-encoded>",
              "release": "26.03",
              "for_sw_deploy": "true"
            }
      operationId: updateSubcloud
      tags:
      - subclouds
      parameters:
      - name: subcloud_ref
        in: query
        description: ID or name of subcloud to update
        required: true
        schema:
          type: string
      - name: verb
        in: query
        description: 'Operation to perform. When null or "redeploy": use
          multipart/form-data.
          When "prestage" or "update_status": use application/json'
        required: false
        schema:
          type: string
          enum:
          - redeploy
          - prestage
          - update_status
      requestBody:
        required: true
        description: Request body format depends on verb parameter. Use
          multipart/form-data
          for no verb or redeploy. Use application/json for prestage or
          update_status.
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/subcloud_name'
                description:
                  $ref: '#/components/schemas/subcloud_description'
                location:
                  $ref: '#/components/schemas/subcloud_location'
                management-state:
                  $ref: '#/components/schemas/management_state'
                group_id:
                  $ref: '#/components/schemas/group_id'
                bootstrap_values:
                  $ref: '#/components/schemas/bootstrap_values'
                install_values:
                  $ref: '#/components/schemas/install_values'
                deploy_config:
                  $ref: '#/components/schemas/deploy_config'
                bmc_password:
                  $ref: '#/components/schemas/bmc_password'
                sysadmin_password:
                  $ref: '#/components/schemas/sysadmin_password'
                release:
                  $ref: '#/components/schemas/release'
                force:
                  $ref: '#/components/schemas/force'
          application/json:
            schema:
              oneOf:
              - title: Prestage Request
                description: Request body for verb=prestage
                type: object
                required:
                - sysadmin_password
                properties:
                  sysadmin_password:
                    $ref: '#/components/schemas/sysadmin_password'
                  force:
                    $ref: '#/components/schemas/force'
                  release:
                    $ref: '#/components/schemas/release'
                  for_install:
                    type: boolean
                    description: Prestage for installation
                  for_sw_deploy:
                    type: boolean
                    description: Prestage for software deployment
                example:
                  sysadmin_password: cGFzc3dvcmQK
                  release: '25.09'
                  for_install: true
                  endpoint: dc-cert
                  status: in-sync
              - title: Update Status Request
                description: Request body for verb=update_status
                type: object
                required:
                - endpoint
                - status
                properties:
                  endpoint:
                    type: string
                    enum:
                    - dc-cert
                    description: Endpoint type (only dc-cert allowed)
                  status:
                    type: string
                    enum:
                    - in-sync
                    - out-of-sync
                    - unknown
                    description: Synchronization status
      responses:
        '200':
          description: Subcloud updated successfully
          content:
            application/json:
              schema:
                type: object
              example:
                id: 9
                name: subcloud1-stx-latest
                description: subcloud1
                location: Kanata
                software-version: '26.03'
                management-state: managed
                availability-status: online
                deploy-status: complete
                backup-status: null
                backup-datetime: null
                error-description: No errors present
                region-name: e6f93b0ca0764ca49c0779497bf20f82
                management-subnet: 192.168.101.0/24
                management-start-ip: 192.168.101.2
                management-end-ip: 192.168.101.50
                management-gateway-ip: 192.168.101.1
                openstack-installed: false
                prestage-status: prestaging
                prestage-versions: null
                systemcontroller-gateway-ip: 192.168.204.101
                data_install: '{"software_version": 26.03,
                  "bootstrap_interface":
                  "enp2s1", "bootstrap_address": "10.10.10.12",
                  "bootstrap_address_prefix":
                  23, "bmc_address": "192.168.122.101", "bmc_username": "admin",
                  "install_type":
                  2, "console_type": "tty0", "rootfs_device": "/dev/sda",
                  "boot_device":
                  "/dev/sda", "wait_for_timeout": 3600, "no_check_certificate":
                  true,
                  "persistent_size": 30000, "bmc_password": "YWRtaW4=", "image":
                    "/opt/dc-vault/software/26.03/starlingx-
                    intel-x86-64-cd.iso"}'
                data_upgrade: null
                created-at: '2026-02-25 18:28:43.715335'
                updated-at: '2026-02-26 11:10:13.287088'
                group_id: 1
                peer_group_id: null
                rehome_data: null
                prestage-software-version: '26.03'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
              example:
                code: 400
                title: Bad Request
                description: 'Prestage skipped ''subcloud1-stx-latest'':
                  Subcloud
                  is not managed.'
        '404':
          description: Subcloud not found
        '422':
          description: Unprocessable entity
        '500':
          description: Internal server error
    delete:
      summary: Delete a subcloud
      description: Delete a subcloud and all its resources
      operationId: deleteSubcloud
      tags:
      - subclouds
      parameters:
      - name: subcloud_ref
        in: query
        description: ID or name of subcloud to delete
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Subcloud deleted successfully
        '400':
          description: Bad request
        '404':
          description: Subcloud not found
        '422':
          description: Unprocessable entity
        '500':
          description: Internal server error
  /v1.0/alarms:
    get:
      summary: Get alarm summary for all subclouds
      description: Retrieve aggregated alarm information for all subclouds
        including
        critical, major, minor alarms, warnings and status
      operationId: getAlarmSummary
      tags:
      - alarms
      responses:
        '200':
          description: Alarm summary retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  alarm_summary:
                    $ref: '#/components/schemas/alarm_summary'
              example:
                alarm_summary:
                - region_name: subcloud1-stx-latest
                  uuid: ae2e7141-eed1-4b48-856a-743feb0a7b80
                  critical_alarms: 0
                  major_alarms: 0
                  minor_alarms: 0
                  warnings: 0
                  cloud_status: OK
        '500':
          description: Internal server error
  /v1.0/sw-update-strategy:
    delete:
      summary: Delete software update strategy
      description: Delete an existing software update strategy
      operationId: deleteSwUpdateStrategy
      tags:
      - sw-update-strategy
      parameters:
      - name: type
        in: query
        description: |
          Strategy type filter.
          Valid values: firmware,
          kube-rootca-update, kubernetes,
          prestage, sw-deploy
        required: false
        schema:
          type: string
          enum:
          - firmware
          - kube-rootca-update
          - kubernetes
          - prestage
          - sw-deploy
      responses:
        '200':
          description: Strategy deleted successfully
          content:
            application/json:
              schema:
                type: object
        '422':
          description: Unprocessable entity
        '500':
          description: Internal server error
    get:
      summary: Get software update strategy
      description: Retrieve software update strategy details
      operationId: getSwUpdateStrategy
      tags:
      - sw-update-strategy
      parameters:
      - name: type
        in: query
        description: |
          Strategy type filter.
          Valid values: firmware,
          kube-rootca-update, kubernetes,
          prestage, sw-deploy
        required: false
        schema:
          type: string
          enum:
          - firmware
          - kube-rootca-update
          - kubernetes
          - prestage
          - sw-deploy
      responses:
        '200':
          description: Strategy retrieved successfully
        '404':
          description: Strategy not found
        '500':
          description: Internal server error
    post:
      summary: Create software update strategy
      description: |
        Create a new software update strategy.
        Strategy type values: firmware,
        kube-rootca-update, kubernetes, prestage,
        sw-deploy.
        Subcloud apply type values: parallel, serial.
      operationId: createSwUpdateStrategy
      tags:
      - sw-update-strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              properties:
                type:
                  type: string
                  enum:
                  - firmware
                  - kube-rootca-update
                  - kubernetes
                  - prestage
                  - sw-deploy
                  description: |
                    Strategy type.
                    Valid values: firmware,
                    kube-rootca-update, kubernetes,
                    prestage, sw-deploy
                subcloud-apply-type:
                  type: string
                  enum:
                  - parallel
                  - serial
                  description: |
                    Apply type for subclouds.
                    Valid values: parallel, serial
                max-parallel-subclouds:
                  $ref: '#/components/schemas/max_parallel_subclouds'
                stop-on-failure:
                  $ref: '#/components/schemas/stop_on_failure'
                force:
                  $ref: '#/components/schemas/force'
                subcloud_group:
                  type: string
                  description: Name or ID of subcloud group
                cloud_name:
                  type: string
                  description: Name of specific cloud
                release:
                  type: string
                  description: |
                    Software release version for prestage operations.
                    Required when type is 'prestage'.
                    Format: MM.mm (e.g., "26.03")
                release_id:
                  type: string
                  description: |
                    Release ID for software deployment operations.
                    Required when type is 'sw-deploy'
                    (unless rollback or delete_only
                    is true).
                    Example: "starlingx-11"
                rollback:
                  type: boolean
                  description: |
                    Rollback to previous software release.
                    Only applicable for sw-deploy strategy type.
                snapshot:
                  type: boolean
                  description: |
                    Create snapshot before software deployment.
                    Only applicable for sw-deploy strategy type.
                with_delete:
                  type: boolean
                  description: |
                    Delete the software deployment post successful
                    strategy application.
                    Only applicable for sw-deploy strategy type.
                delete_only:
                  type: boolean
                  description: |
                    Delete the software deployment without
                    performing deployment.
                    Only applicable for sw-deploy strategy type.
                with_prestage:
                  type: boolean
                  description: |
                    Prestage software before deployment.
                    Only applicable for sw-deploy strategy type.
                sysadmin_password:
                  type: string
                  description: |
                    Base64 encoded sysadmin password for subcloud access.
                    Required when with_prestage is true
                    for sw-deploy strategy.
                to-version:
                  type: string
                  description: |
                    Target Kubernetes version for upgrade.
                    Only applicable for kubernetes strategy type.
                expiry-date:
                  type: string
                  format: date
                  description: |
                    Certificate expiry date in YYYY-MM-DD format.
                    Only applicable for kube-rootca-update strategy type.
                subject:
                  type: string
                  description: |
                    Certificate subject specification.
                    Only applicable for kube-rootca-update strategy type.
                    Format: >-
                      C=<Country> ST=<State/Province>
                      L=<Locality> O=<Organization>
                      OU=<OrganizationUnit>
                      CN=<commonName>
            examples:
              sw_deploy_strategy:
                summary: Create SW Deploy Strategy
                description: Create a software deployment strategy with delete
                  option
                value:
                  type: sw-deploy
                  release_id: starlingx-26.03.0
                  subcloud_group: '21'
                  with_delete: 'true'
              prestage_strategy:
                summary: Create Prestage Strategy
                description: Create a prestage strategy for software preparation
                value:
                  type: prestage
                  release: '26.03'
                  subcloud_group: '1'
                  sysadmin_password: cGFzc3dvcmQK
                  for_sw_deploy: 'true'
                  for_install: 'false'
                  stop-on-failure: 'true'
              kubernetes_upgrade:
                summary: Create Kubernetes Upgrade Strategy
                description: Create a Kubernetes upgrade strategy
                value:
                  type: kubernetes
                  to-version: v1.24.4
                  subcloud-apply-type: parallel
                  max-parallel-subclouds: '3'
                  stop-on-failure: 'false'
              kube_rootca_update:
                summary: Create Kube Root CA Update Strategy
                description: Create a Kubernetes root CA certificate update
                  strategy
                value:
                  type: kube-rootca-update
                  expiry-date: '2025-12-31'
                  subject: C=CA ST=Ontario L=Ottawa O=WindRiver OU=Engineering
                    CN=StarlingX
                  subcloud-apply-type: serial
                  stop-on-failure: true
      responses:
        '200':
          description: Strategy created successfully
        '400':
          description: Bad request
        '422':
          description: Unprocessable entity
        '500':
          description: Internal server error
  /v1.0/sw-update-strategy/steps:
    get:
      summary: Get software update strategy steps
      description: Retrieve strategy steps
      operationId: getSwUpdateStrategySteps
      tags:
      - sw-update-strategy
      parameters:
      - name: type
        in: query
        description: |
          Strategy type filter.
          Valid values: firmware,
          kube-rootca-update, kubernetes,
          prestage, sw-deploy
        required: false
        schema:
          type: string
          enum:
          - firmware
          - kube-rootca-update
          - kubernetes
          - prestage
          - sw-deploy
      responses:
        '200':
          description: Strategy steps retrieved successfully
          content:
            application/json:
              schema:
                type: object
              example:
                strategy-steps:
                - id: 1
                  cloud: subcloud2
                  stage: Create
                  state: initial
                  details: ''
                  started-at: null
                  finished-at: null
                  created-at: '2026-03-04 14:24:47.700836'
                  updated-at: null
        '404':
          description: Strategy not found
        '500':
          description: Internal server error
  /v1.0/sw-update-strategy/steps/{cloud_name}:
    get:
      summary: Get specific strategy step for cloud
      description: Retrieve strategy step for a specific cloud
      operationId: getSwUpdateStrategyStepByCloud
      tags:
      - sw-update-strategy
      parameters:
      - name: cloud_name
        in: path
        description: Name of cloud for specific step
        required: true
        schema:
          type: string
      - name: type
        in: query
        description: |
          Strategy type filter.
          Valid values: firmware,
          kube-rootca-update, kubernetes,
          prestage, sw-deploy
        required: false
        schema:
          type: string
          enum:
          - firmware
          - kube-rootca-update
          - kubernetes
          - prestage
          - sw-deploy
      responses:
        '200':
          description: Strategy step retrieved successfully
          content:
            application/json:
              schema:
                type: object
              example:
                id: 1
                cloud: subcloud2
                stage: Create
                state: initial
                details: ''
                started-at: null
                finished-at: null
                created-at: '2026-03-04 14:24:47.700836'
                updated-at: null
        '404':
          description: Strategy step not found
        '500':
          description: Internal server error
  /v1.0/sw-update-strategy/actions:
    post:
      summary: Apply or abort software update strategy
      description: |
        Apply or abort an existing strategy.
        Valid action values: apply, abort.
      operationId: applySwUpdateStrategy
      tags:
      - sw-update-strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              properties:
                action:
                  $ref: '#/components/schemas/sw_update_strategy_action'
      responses:
        '200':
          description: Action applied successfully
          content:
            application/json:
              schema:
                type: object
              example:
                id: 1
                type: sw-deploy
                subcloud-apply-type: parallel
                max-parallel-subclouds: 2
                stop-on-failure: false
                state: applying
                created-at: '2026-03-04T14:24:47.698157'
                updated-at: '2026-03-04T14:57:18.049556'
                extra-args:
                  delete_only: false
                  release_id: starlingx-11
                  rollback: false
                  snapshot: false
                  sysadmin_password: null
                  with_prestage: false
                  with_delete: true
        '400':
          description: Bad request
        '422':
          description: Unprocessable entity
        '500':
          description: Internal server error
  /v1.0/sw-update-options:
    get:
      summary: Get software update options
      description: Retrieve software update options for all subclouds or a
        specific
        subcloud
      operationId: getSwUpdateOptions
      tags:
      - sw-update-options
      parameters:
      - name: subcloud_ref
        in: query
        description: ID or name of subcloud
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Options retrieved successfully
          content:
            application/json:
              schema:
                type: object
              example:
                id: 1
                name: subcloud1-stx-latest
                subcloud-id: 9
                storage-apply-type: parallel
                worker-apply-type: parallel
                max-parallel-workers: 10
                alarm-restriction-type: relaxed
                default-instance-action: migrate
                created-at: '2026-03-04 00:50:07.041135'
                updated-at: null
        '404':
          description: Subcloud not found
          content:
            application/json:
              schema:
                type: object
              example:
                code: 404
                title: Not Found
                description: No options found for Subcloud with id 9, defaults
                  will
                  be used.
        '500':
          description: Internal server error
    post:
      summary: Create or update software update options
      description: Create or update software update options for a subcloud or
        default
        options
      operationId: updateSwUpdateOptions
      tags:
      - sw-update-options
      parameters:
      - name: subcloud_ref
        in: query
        description: ID or name of subcloud
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - storage-apply-type
              - worker-apply-type
              - max-parallel-workers
              - alarm-restriction-type
              - default-instance-action
              properties:
                storage-apply-type:
                  $ref: '#/components/schemas/storage_apply_type'
                worker-apply-type:
                  $ref: '#/components/schemas/worker_apply_type'
                max-parallel-workers:
                  $ref: '#/components/schemas/max_parallel_workers'
                alarm-restriction-type:
