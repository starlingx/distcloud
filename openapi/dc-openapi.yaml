tags:
- name: root
  description: Root API endpoint provides version information for the
    Distributed
    Cloud Manager API.
- name: subclouds
  description: Subclouds are systems managed by a central System Controller.
- name: subcloud-groups
  description: Subcloud Groups are logical groupings managed by a central System
    Controller.
    Subclouds in a group can be updated in parallel when applying patches or
    software
    upgrades.
- name: subcloud-peer-groups
  description: Subcloud Peer Groups are logical groupings managed by a central
    System
    Controller. Each Subcloud Peer Group maintains information for subcloud
    migration
    and rehoming in Geo-Redundancy deployment.
- name: system-peers
  description: System Peers are logical entities which are managed by a central
    System
    Controller. Each System Peer maintains the information which is used for
    health
    check and data synchronization in the protection group in Geo-Redundancy
    deployment.
- name: peer-group-associations
  description: Peer Group Associations are logical connections managed by a
    central
    System Controller. They link subcloud peer groups with system peers for Geo-
    Redundancy
    operations.
- name: sw-update-strategy
  description: Software Update Strategy manages orchestrated updates across
    subclouds
    including firmware, Kubernetes, kube-rootca-update, prestage, and software
    deployments.
- name: sw-update-options
  description: Software Update Options are configurable settings that control
    how
    software updates are applied to subclouds.
- name: alarms
  description: Subcloud alarms are aggregated on the System Controller for
    centralized
    monitoring.
- name: subcloud-backup
  description: Subcloud Backups allow for essential subcloud system data and
    optionally
    container images to be backed up and restored.
- name: subcloud-deploy
  description: Subcloud Deploy APIs allow for the display and upload of
    deployment
    manager common files and helm charts.
- name: phased-subcloud-deploy
  description: 'Phased Subcloud Deploy APIs allow for subcloud deployment to be
    done
    in phases: install, bootstrap, and configure.'
- name: notifications
  description: Notifications API allows external systems to send notifications
    to
    the System Controller.
openapi: 3.0.2
components:
  schemas:
    administrative_state:
      description: |
        The administrative state of the system
        peer site. (enabled, disabled)
      type: string
    alarm_restriction_type:
      description: |
        Whether to allow update if subcloud alarms are present or not.
        Valid values are `strict` or `relaxed`.
      type: string
    alarm_summary:
      description: The list of alarm summaries.
      items:
        type: string
      type: array
    association_peer_group_id:
      description: The ID of the subcloud peer group as an integer.
      type: string
    association_peer_group_priority:
      description: |
        The priority of the subcloud peer group in peer group association.
        The lower the value, the higher the priority.
      type: integer
    association_sync_status:
      description: The sync status for association.
      type: string
    auto_restore:
      description: |
        Performs a subcloud restore by automatically triggering the restore
        process locally in the subcloud using only BMC connectivity.
        Also restores container images.
        Can be used with or without the local-only and with-install options.
        Defaults to False.
      type: string
      enum:
      - 'true'
      - 'false'
    backup_local_only:
      description: |
        Flag to indicate whether the platform
        backup is to be saved locally within
        the subcloud.
        Defaults to False.
      type: string
      enum:
      - 'true'
      - 'false'
    backup_registry_images:
      description: |
        Flag to indicate whether registry images backup should also be
        generated (local only).
        Defaults to False.
      type: string
      enum:
      - 'true'
      - 'false'
    backup_restore_values:
      description: Content of a restore playbook overrides file.
      type: string
      format: binary
    backup_subcloud_group_name_or_id:
      description: |
        Name or ID of the group of subclouds to be backed up.
        To be specified if and only if 'subcloud' is not provided.
      type: string
    backup_subcloud_name_or_id:
      description: |
        Name or ID of the subcloud to be backed up.
        To be specified if and only if 'group' is not provided.
      type: string
    backup_values:
      description: |
        Content of a backup playbook overrides
        file, if needed (e.g. backup_dir).
      format: binary
      type: string
    bmc_password:
      description: The BMC password of the subcloud. Must be base64 encoded.
      type: string
    bootstrap_address:
      description: An OAM IP address of the subcloud controller-0.
      type: string
    bootstrap_values:
      description: |
        The content of a file containing the
        bootstrap overrides such as subcloud
        name, management and OAM subnet.
        The sysadmin password of the subcloud.
        Must be base64 encoded.
      format: binary
      type: string
    cloud_init_config:
      description: |
        The content of a tarball containing
        cloud-init config files for the
        subcloud.
      format: binary
      type: string
    default_instance_action:
      description: |
        How instances should be handled.
        Valid values are `stop-start` or `migrate`.
      type: string
    deploy_config:
      description: |
        The content of a file containing the resource definitions describing
        the desired subcloud configuration.
      format: binary
      type: string
    factory_restore:
      description: |
        Performs a subcloud restore with
        installation, automatically triggering
        a factory restore locally in the
        subcloud after installation completes.
        Also
        restores container images using the local factory backup stored in the
        subcloud.
        Defaults to False.
      type: string
      enum:
      - 'true'
      - 'false'
    force:
      description: |
        Indicates whether to disregard subcloud
        management alarm condition.
      type: boolean
    group_id:
      description: The ID of a subcloud group. Default is 1.
      type: integer
    heartbeat_failure_policy:
      description: |
        The failure policy of the peer site
        heartbeats. (alarm, rehome, delegate)
      type: string
    heartbeat_failure_threshold:
      description: The failure threshold of the peer site heartbeats.
      type: integer
    heartbeat_interval:
      description: |
        The interval of the message between the
        peer site heartbeats. (in seconds)
      type: integer
    heartbeat_maintenance_timeout:
      description: |
        The maintenance timeout of the peer site
        heartbeats. (in seconds)
      type: integer
    install_values:
      description: |
        The content of a file containing install variables such as subcloud
        bootstrap interface and BMC information.
      format: binary
      type: string
    management_state:
      description: Management state of the subcloud.
      type: string
    manager_endpoint:
      description: The endpoint of the system peer site manager.
      type: string
    manager_password:
      description: The password of the system peer site manager.
      type: string
    manager_username:
      description: The username of the system peer site manager.
      type: string
    max_parallel_subclouds:
      description: The maximum number of subclouds to update in parallel.
      type: integer
    max_parallel_workers:
      description: |
        The maximum number of workers within a
        subcloud to update in parallel.
      type: integer
    peer_controller_gateway_address:
      description: |
        The gateway IP address of the system peer
