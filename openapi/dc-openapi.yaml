                system_leader_id: fba24562-e071-4c09-8616-a96bc19702f3
                system_leader_name: s1-system-controller
                migration_status: null
                created-at: '2026-03-12 19:20:18.700628'
                updated-at: '2026-03-12 20:54:15.731299'
